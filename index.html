<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10.0000s Room Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-2" aria-hidden="true"></div>

  <main class="game-shell" role="main">
    <div class="top-user">
      <label class="input-wrap compact">
        <span>Username</span>
        <input id="usernameInput" type="text" maxlength="20" placeholder="Enter username" />
      </label>
    </div>

    <header class="game-header">
      <p class="eyebrow">STOP TIMER CHALLENGE</p>
      <h1>Stop At <span>10.0000s</span></h1>
      <p class="subtitle">Play solo instantly, or switch to multiplayer rooms with friends.</p>
    </header>

    <section class="timer-card" aria-live="polite">
      <div class="mode-switch" role="group" aria-label="Game mode">
        <button id="singleModeBtn" class="btn btn-primary active-mode">Singleplayer</button>
        <button id="multiModeBtn" class="btn btn-ghost">Multiplayer</button>
      </div>

      <div id="multiplayerPanel" class="multiplayer-panel hidden">
        <div class="lobby-grid">
          <label class="input-wrap">
            <span>Room Code</span>
            <input id="roomInput" type="text" maxlength="6" placeholder="ABC123" />
          </label>
        </div>

        <div class="controls">
          <button id="createRoomBtn" class="btn btn-primary">Create Room</button>
          <button id="joinRoomBtn" class="btn btn-accent">Join Room</button>
        </div>

        <div class="room-line">
          <span>Room:</span>
          <strong id="roomCodeDisplay">Not connected</strong>
        </div>
      </div>

      <div id="timerDisplay" class="timer-display">0.0000</div>
      <p class="target">Target: 10.0000s</p>

      <div id="singleControls" class="controls">
        <button id="singleStartBtn" class="btn btn-primary">Start</button>
        <button id="singleStopBtn" class="btn btn-accent" disabled>Stop</button>
        <button id="singleResetBtn" class="btn btn-ghost">Reset</button>
      </div>

      <div id="multiControls" class="controls hidden">
        <button id="startRoundBtn" class="btn btn-primary" disabled>Start Round</button>
        <button id="multiStopBtn" class="btn btn-accent" disabled>Stop</button>
      </div>

      <div id="feedback" class="feedback">Singleplayer mode: press Start to begin.</div>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="label">Attempts</span>
          <span id="attempts" class="value">0</span>
        </div>
        <div class="stat-card">
          <span class="label">Best Paused Time</span>
          <span id="bestPaused" class="value">--</span>
        </div>
      </div>

      <div class="leaderboard">
        <div class="leaderboard-head">
          <h2>Leaderboard</h2>
          <small id="roundStatus">Paused times only</small>
        </div>
        <ol id="leaderboardList" class="leaderboard-list"></ol>
      </div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
