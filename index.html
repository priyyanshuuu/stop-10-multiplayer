<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10.0000s Room Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-2" aria-hidden="true"></div>

  <main class="game-shell" role="main">
    <header class="game-header">
      <p class="eyebrow">REAL-TIME MULTIPLAYER</p>
      <h1>Stop At <span>10.0000s</span></h1>
      <p class="subtitle">Create a room, share the code, and compete live with friends.</p>
    </header>

    <section class="timer-card" aria-live="polite">
      <div class="lobby-grid">
        <label class="input-wrap">
          <span>Your Name</span>
          <input id="nameInput" type="text" maxlength="20" placeholder="Enter name" />
        </label>
        <label class="input-wrap">
          <span>Room Code</span>
          <input id="roomInput" type="text" maxlength="6" placeholder="ABC123" />
        </label>
      </div>

      <div class="controls">
        <button id="createRoomBtn" class="btn btn-primary">Create Room</button>
        <button id="joinRoomBtn" class="btn btn-accent">Join Room</button>
      </div>

      <div class="room-line">
        <span>Room:</span>
        <strong id="roomCodeDisplay">Not connected</strong>
      </div>

      <div id="timerDisplay" class="timer-display">0.0000</div>
      <p class="target">Target: 10.0000s</p>

      <div class="level-picker" role="group" aria-label="Difficulty level">
        <button class="level-btn active" data-level="easy">Easy</button>
        <button class="level-btn" data-level="pro">Pro</button>
        <button class="level-btn" data-level="insane">Insane</button>
      </div>

      <div class="controls">
        <button id="startRoundBtn" class="btn btn-primary" disabled>Start Round</button>
        <button id="stopBtn" class="btn btn-accent" disabled>Stop</button>
      </div>

      <div id="feedback" class="feedback">Create or join a room to begin.</div>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="label">You: Score</span>
          <span id="myScore" class="value">0</span>
        </div>
        <div class="stat-card">
          <span class="label">You: Best Delta</span>
          <span id="myBest" class="value">--</span>
        </div>
      </div>

      <div class="leaderboard">
        <div class="leaderboard-head">
          <h2>Live Leaderboard</h2>
          <small id="roundStatus">Waiting for round</small>
        </div>
        <ol id="leaderboardList" class="leaderboard-list"></ol>
      </div>

      <div class="leaderboard">
        <div class="leaderboard-head">
          <h2>Round Results</h2>
          <small>Latest round only</small>
        </div>
        <ol id="roundList" class="leaderboard-list"></ol>
      </div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
